
x-base-app-setting: &x-base-app
  image: sync-docs
  build: ./backend

services:

    test:
      # 這個服務專門用來跑測試
      # docker compose up   # 啟動常規服務，跳過測試。
      # docker compose up test # 只運行測試及其直接依賴。
      # docker compose --profile testing up # 啟動所有 被標記 profile: "testing" 的服務
      <<: *x-base-app
      command: bash -c "pytest --cov=. --cov-report=html"
      # command: bash -c "pytest -s" # print log
      volumes:
        - ./backend:/sync-docs
      profiles:
        - "testing"

    backend:
      <<: *x-base-app
      # 生產環境使用 Daphne ASGI 伺服器（支援 HTTP + WebSocket）
      command: bash -c "daphne -b 0.0.0.0 -p 8000 backend.asgi:application"
      restart: always
      ports:
        - "8000:8000"
      environment:
        - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
        - DJANGO_DEBUG=${DJANGO_DEBUG:-False}
        - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS}
        - POSTGRES_HOST=django-postgres
        - POSTGRES_DB=${POSTGRES_DB:-postgres}
        - POSTGRES_USER=${POSTGRES_USER:-myuser}
        - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
        - REDIS_HOST=django-redis
        - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
        - GEMINI_API_KEY=${GEMINI_API_KEY:-}
        - GEMINI_MODEL=${GEMINI_MODEL:-gemini-3-flash-preview}
      depends_on:
        - django-postgres
        - django-redis

    django-postgres:
      image: postgres:18
      # ports:
      #   - "5432:5432"
      environment:
        - POSTGRES_DB=${POSTGRES_DB:-postgres}
        - POSTGRES_USER=${POSTGRES_USER:-myuser}
        - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
        - PGDATA=/var/lib/postgresql/data/pgdata
      volumes:
        - db-data:/var/lib/postgresql/data/pgdata

    django-redis:
      image: redis:8-alpine
      restart: always
      command: ["redis-server", "--appendonly", "yes"]
      # ports:
      #   - "6379:6379"
      volumes:
        - redis-data:/data

    # 前端 SvelteKit 服務
    # 注意：前端生產部署需要切換至 @sveltejs/adapter-node 並修改 Dockerfile
    frontend:
      build: ./frontend
      container_name: sveltekit_frontend
      command: sh -c "npx svelte-kit sync && npm run dev"
      volumes:
        - ./frontend:/app
        - frontend-node-modules:/app/node_modules # 用 named volume 管理，依賴更新時執行 docker compose down -v 清除
      ports:
        - "5173:5173"
      depends_on:
        - backend

volumes:
  db-data:
  redis-data:
  frontend-node-modules:
